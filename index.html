<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Agencias - Castellana Wagen M-40</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyCRfERugbIVfAXtKa7mGdLLTm6xwxb5wlE",
      authDomain: "gestion-flotas-vw.firebaseapp.com",
      projectId: "gestion-flotas-vw",
      storageBucket: "gestion-flotas-vw.firebasestorage.app",
      messagingSenderId: "1070891769268",
      appId: "1:1070891769268:web:47b04e6d62e576038966e1"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let cocheActual = null;

    // Función de búsqueda
    window.buscarCoche = async function() {
      const input = document.getElementById('inputMatricula');
      const mat = input.value.replace(/\s/g, '').toUpperCase();
      if (!mat) return Swal.fire('Error', 'Introduce una matrícula', 'error');

      Swal.fire({ title: 'Buscando...', didOpen: () => Swal.showLoading() });
      try {
        const q = query(collection(db, "vehiculos"), where("matricula", "==", mat));
        const querySnapshot = await getDocs(q);
        if (querySnapshot.empty) {
          Swal.fire('No encontrado', 'No hay registros en nuestras instalaciones.', 'info');
          document.getElementById('resultado').style.display = 'none'; return;
        }
        cocheActual = querySnapshot.docs[0].data();
        mostrarTracker(cocheActual);
        Swal.close();
      } catch (error) { Swal.fire('Error', 'Fallo de conexión.', 'error'); }
    };

    // Función para mostrar resultados
   // Función para mostrar resultados con diseño Profesional tipo Correos/Amazon
    window.mostrarTracker = function(c) {
       document.getElementById('resultado').style.display = 'block';
       document.getElementById('resModelo').innerText = c.modelo;
       document.getElementById('resMatricula').innerText = c.matricula;

       // Contenedor principal de la línea vertical
       let html = '<div class="relative border-l-2 border-gray-200 ml-4 space-y-8 mt-8 mb-10">';
       
       // Configuración de cada paso con sus emojis, colores y textos dinámicos
       const pasos = [
         { 
           ok: !!c.fechaDoc, 
           t: 'Documentación', 
           desc: c.fechaDoc ? `Recibida y validada el ${c.fechaDoc}` : 'Pendiente de recibir documentación',
           icon: '📄', 
           colorBg: 'bg-blue-500' 
         },
         { 
           ok: !!c.fechaTransporte, 
           t: 'En Tránsito', 
           desc: c.fechaTransporte ? `En camino a concesionario desde el ${c.fechaTransporte}` : 'Esperando entrada en nuestra campa',
           icon: '🚛', 
           colorBg: 'bg-indigo-500' 
         },
         { 
           ok: !!c.fechaPreparacion, 
           t: 'En Preparación', 
           desc: c.fechaPreparacion ? `En preparación desde el ${c.fechaPreparacion}` : 'Pendiente de revisión y preparación de pre-entrega',
           icon: '🛠️', 
           colorBg: 'bg-amber-500' 
         },
         { 
           ok: c.pasoAInventario === true, 
           t: 'Listo para Entrega', 
           desc: c.pasoAInventario ? 'Vehículo preparado, dar disponibilidad al cliente a partir de hoy para que agende la recogida de su nuevo Volkswagen' : 'Esperando finalización de procesos',
           icon: '🏁', 
           colorBg: 'bg-[#25D366]' 
         }
       ];

       pasos.forEach((p, index) => {
         // Estilos dependiendo de si el paso está completado o no
         let bgClass = p.ok ? `${p.colorBg} text-white shadow-md border-transparent` : 'bg-gray-50 border-2 border-gray-300 text-transparent grayscale';
         let textTitle = p.ok ? 'text-[#001e50]' : 'text-gray-400';
         let textDesc = p.ok ? 'text-gray-600' : 'text-gray-400';
         let pulseHtml = "";
         
         // Efecto visual: si este paso está Ok, pero el SIGUIENTE no lo está, significa que es el "Paso Actual". Le ponemos un efecto de latido.
         let nextOk = pasos[index + 1] ? pasos[index + 1].ok : false;
         if (p.ok && !nextOk && index !== 3) {
             pulseHtml = `<span class="absolute inline-flex h-full w-full rounded-full ${p.colorBg} opacity-50 animate-ping"></span>`;
         }

         // Dibujamos la tarjeta del paso
         html += `
         <div class="relative flex items-center gap-4">
            <div class="absolute -left-[17px] w-8 h-8 rounded-full flex items-center justify-center text-sm ring-4 ring-white transition-all duration-500 z-10 ${bgClass}">
                ${pulseHtml}
                <span class="relative z-20">${p.ok ? p.icon : '⏳'}</span>
            </div>
            <div class="pl-8">
                <h3 class="font-black text-[14px] uppercase tracking-widest ${textTitle} transition-colors duration-300">${p.t}</h3>
                <p class="text-[11px] font-bold ${textDesc} mt-0.5">${p.desc}</p>
            </div>
         </div>`;
       });

       html += '</div>';
       document.getElementById('timelineRenting').innerHTML = html;

       // LÓGICA DEL BOTÓN: Totalmente forzada a mostrarse solo si está listo en inventario
       const btnNotificar = document.getElementById('btnNotificar');
       if (c.pasoAInventario === true) {
           btnNotificar.style.display = 'flex';
       } else {
           btnNotificar.style.display = 'none';
       }
    };

    // Función de WhatsApp actualizada
    window.notificarCliente = function() {
      if (!cocheActual) return;

      const LINK_APP_CLIENTES = "https://vwmadrid.github.io/Entregas/"; 
      
      let estaListo = cocheActual.pasoAInventario === true;
      let mensaje = "";

      if (estaListo) {
        mensaje = `Estimado cliente, le informamos que su coche ${cocheActual.modelo} con matrícula ${cocheActual.matricula} ya está listo para su entrega. 
        
A continuación le dejamos la web donde podrá agendar la entrega de su vehículo: 
👉 ${LINK_APP_CLIENTES}`;
      } else {
        mensaje = `Hola, le informamos desde su agencia de Renting que su vehículo ${cocheActual.modelo} con matrícula ${cocheActual.matricula} se encuentra actualmente en fase de preparación en Castellana Wagen M-40. Le avisaremos en cuanto esté listo para su recogida.`;
      }

      window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, '_blank');
    };
  </script>
</head>
<body>

  <header class="w-full bg-white border-b border-gray-200 shadow-sm py-5 px-6">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14">
                <img src="https://cdn.worldvectorlogo.com/logos/volkswagen-logo-2019.svg" alt="VW Logo" class="w-full h-full object-contain">
            </div>
            <div>
                <h1 class="text-xl font-black text-[#001e50] uppercase tracking-tight">Castellana Wagen M-40</h1>
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Portal Agencias de Renting</p>
            </div>
        </div>
    </div>
  </header>

  <main class="flex-1 flex flex-col items-center justify-center p-6">
    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-lg border-t-8 border-[#001e50] text-center mb-6">
        <h2 class="text-2xl font-black text-[#001e50] mb-2">Localizador de Flota</h2>
        <input type="text" id="inputMatricula" placeholder="EJ: 1234 ABC" class="w-full px-6 py-5 bg-gray-50 border-2 rounded-xl text-2xl font-black text-center uppercase tracking-widest mb-4">
        <button onclick="buscarCoche()" class="w-full bg-[#001e50] text-white font-black py-4 rounded-xl text-lg uppercase">Buscar Vehículo</button>
    </div>
    
    <div id="resultado" style="display: none;" class="w-full max-w-lg bg-white rounded-2xl shadow-xl p-8 border border-gray-200">
       <h2 id="resModelo" class="text-xl font-black text-[#001e50] uppercase text-center mb-1">Modelo</h2>
       <p id="resMatricula" class="text-center font-bold text-gray-500 bg-gray-100 w-max mx-auto px-3 py-1 rounded mb-6"></p>
       <div id="timelineRenting" class="mb-8"></div>
       
       <button id="btnNotificar" onclick="notificarCliente()" style="display: none;" class="w-full bg-[#25D366] text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2">
         <i class="ph-fill ph-whatsapp-logo text-2xl"></i> Avisar al Cliente
       </button>
    </div>
  </main>
</body>
</html>
