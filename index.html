<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Agencias - Castellana Wagen M-40</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyCRfERugbIVfAXtKa7mGdLLTm6xwxb5wlE",
      authDomain: "gestion-flotas-vw.firebaseapp.com",
      projectId: "gestion-flotas-vw",
      storageBucket: "gestion-flotas-vw.firebasestorage.app",
      messagingSenderId: "1070891769268",
      appId: "1:1070891769268:web:47b04e6d62e576038966e1"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let cocheActual = null;

    // Función de búsqueda
    window.buscarCoche = async function() {
      const input = document.getElementById('inputMatricula');
      const mat = input.value.replace(/\s/g, '').toUpperCase();
      if (!mat) return Swal.fire('Error', 'Introduce una matrícula', 'error');

      Swal.fire({ title: 'Buscando...', didOpen: () => Swal.showLoading() });
      try {
        const q = query(collection(db, "vehiculos"), where("matricula", "==", mat));
        const querySnapshot = await getDocs(q);
        if (querySnapshot.empty) {
          Swal.fire('No encontrado', 'No hay registros en nuestras instalaciones.', 'info');
          document.getElementById('resultado').classList.add('hidden'); return;
        }
        cocheActual = querySnapshot.docs[0].data();
        mostrarTracker(cocheActual);
        Swal.close();
      } catch (error) { Swal.fire('Error', 'Fallo de conexión.', 'error'); }
    };

    // Función para mostrar resultados
   // Función para mostrar resultados
    window.mostrarTracker = function(c) {
       document.getElementById('resultado').classList.remove('hidden');
       document.getElementById('resModelo').innerText = c.modelo;
       document.getElementById('resMatricula').innerText = c.matricula;

       let html = "";
       const cCheck = "bg-[#25D366] text-white";
       const cWait = "bg-gray-200 text-gray-300";
       const pasos = [
         { ok: !!c.fechaDoc, t: 'Documentación' },
         { ok: !!c.fechaTransporte, t: 'En Transporte' },
         { ok: !!c.fechaPreparacion, t: 'En Preparación' },
         { ok: c.pasoAInventario === true, t: 'Listo para Entrega' }
       ];

       pasos.forEach(p => {
         html += `<div class="flex items-center gap-4 mb-4">
                    <div class="${p.ok ? cCheck : cWait} rounded-full w-8 h-8 flex items-center justify-center font-bold">✓</div>
                    <div class="font-bold text-gray-800">${p.t}</div>
                  </div>`;
       });
       document.getElementById('timelineRenting').innerHTML = html;

       // LÓGICA DEL BOTÓN: Mostrar solo si el coche está listo
       const btnNotificar = document.getElementById('btnNotificar');
       if (c.pasoAInventario === true) {
           btnNotificar.classList.remove('hidden');
           btnNotificar.classList.add('flex'); // Lo mostramos y aplicamos flexbox
       } else {
           btnNotificar.classList.add('hidden');
           btnNotificar.classList.remove('flex'); // Lo volvemos a ocultar
       }
    };
    // Función de WhatsApp actualizada con el nuevo enlace
    window.notificarCliente = function() {
      if (!cocheActual) return;

      // Enlace oficial de la App de Clientes
      const LINK_APP_CLIENTES = "https://vwmadrid.github.io/Entregas/"; 
      
      let estaListo = cocheActual.pasoAInventario === true;
      let mensaje = "";

      if (estaListo) {
        mensaje = `Estimado cliente, le informamos que su coche ${cocheActual.modelo} con matrícula ${cocheActual.matricula} ya está listo para su entrega. 
        
A continuación le dejamos la web donde podrá agendar la entrega de su vehículo: 
👉 ${LINK_APP_CLIENTES}`;
      } else {
        mensaje = `Hola, le informamos desde su agencia de Renting que su vehículo ${cocheActual.modelo} con matrícula ${cocheActual.matricula} se encuentra actualmente en fase de preparación en Castellana Wagen M-40. Le avisaremos en cuanto esté listo para su recogida.`;
      }

      window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, '_blank');
    };
  </script>
</head>
<body>

  <header class="w-full bg-white border-b border-gray-200 shadow-sm py-5 px-6">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14">
                <img src="https://cdn.worldvectorlogo.com/logos/volkswagen-logo-2019.svg" alt="VW Logo" class="w-full h-full object-contain">
            </div>
            <div>
                <h1 class="text-xl font-black text-[#001e50] uppercase tracking-tight">Castellana Wagen M-40</h1>
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Portal Agencias de Renting</p>
            </div>
        </div>
    </div>
  </header>

  <main class="flex-1 flex flex-col items-center justify-center p-6">
    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-lg border-t-8 border-[#001e50] text-center mb-6">
        <h2 class="text-2xl font-black text-[#001e50] mb-2">Localizador de Flota</h2>
        <input type="text" id="inputMatricula" placeholder="EJ: 1234 ABC" class="w-full px-6 py-5 bg-gray-50 border-2 rounded-xl text-2xl font-black text-center uppercase tracking-widest mb-4">
        <button onclick="buscarCoche()" class="w-full bg-[#001e50] text-white font-black py-4 rounded-xl text-lg uppercase">Buscar Vehículo</button>
    </div>
    
    <div id="resultado" class="hidden w-full max-w-lg bg-white rounded-2xl shadow-xl p-8 border border-gray-200">
       <h2 id="resModelo" class="text-xl font-black text-[#001e50] uppercase text-center mb-1">Modelo</h2>
       <p id="resMatricula" class="text-center font-bold text-gray-500 bg-gray-100 w-max mx-auto px-3 py-1 rounded mb-6"></p>
       <div id="timelineRenting" class="mb-8"></div>
       <button onclick="notificarCliente()" class="w-full bg-[#25D366] text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2">
        <div id="timelineRenting" class="mb-8"></div>
       
       <button id="btnNotificar" onclick="notificarCliente()" class="hidden w-full bg-[#25D366] text-white font-bold py-4 rounded-xl items-center justify-center gap-2">
         <i class="ph-fill ph-whatsapp-logo text-2xl"></i> Avisar al Cliente
       </button>
       </button>
    </div>
  </main>
</body>
</html>
