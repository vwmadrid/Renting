<html lang="es">
<head>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VW Partner Portal</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001E50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VW Partners">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/6/6d/Volkswagen_logo_2019.svg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ... el resto de tu código sigue igual ... */
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --vw-blue: #001E50;
            --vw-light: #00B0F0;
            --success: #2e7d32;
            --pending: #e0e0e0;
            --bg-light: #f4f6f9;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-light); color: var(--vw-blue); }
        
        .container { max-width: 600px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* HEADER */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 2px solid #e0e0e0; }
        .logo { width: 50px; }
        .portal-title { font-weight: 800; font-size: 18px; }
        .portal-subtitle { font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

        /* BUSCADOR */
        .search-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 18px; text-align: center; text-transform: uppercase; font-weight: bold; outline: none; margin-bottom: 15px; }
        button { background: var(--vw-blue); color: white; border: none; width: 100%; padding: 18px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* RESULTADOS */
        #result-area { margin-top: 30px; display: none; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .card-header { padding: 20px; background: #f8f9fa; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .model-name { font-weight: 900; font-size: 20px; }
        .plate { background: #fff; border: 1px solid #ccc; padding: 5px 10px; border-radius: 5px; font-family: monospace; font-weight: bold; }
        
        /* TIMELINE */
        .tracking-container { padding: 30px 20px; }
        .timeline-item { display: flex; gap: 20px; padding-bottom: 30px; position: relative; }
        .timeline-item:last-child { padding-bottom: 0; }
        .timeline-item::before { content: ''; position: absolute; left: 14px; top: 30px; bottom: 0; width: 2px; background: var(--pending); z-index: 0; }
        .timeline-item:last-child::before { display: none; }
        .timeline-item.completed::before { background: var(--success); }
        .dot { width: 30px; height: 30px; border-radius: 50%; background: var(--pending); color: white; display: flex; align-items: center; justify-content: center; z-index: 1; flex-shrink: 0; font-size: 12px; }
        .timeline-item.completed .dot { background: var(--success); }
        .timeline-item.current .dot { background: var(--vw-light); box-shadow: 0 0 0 4px rgba(0, 176, 240, 0.2); }
        .content { flex: 1; }
        .step-title { font-weight: bold; font-size: 14px; margin-bottom: 4px; color: #999; }
        .timeline-item.completed .step-title, .timeline-item.current .step-title { color: var(--vw-blue); }
        .step-date { font-size: 12px; color: #666; }

        .current-status-banner { background: var(--vw-blue); color: white; text-align: center; padding: 15px; font-size: 14px; }

        /* SECCIÓN NOTIFICACIÓN CLIENTE */
        .notify-section {
            background: #e8f5e9; border-top: 1px solid #c8e6c9; padding: 25px 20px; text-align: center;
        }
        .notify-title { color: #2e7d32; font-weight: 800; font-size: 16px; margin-bottom: 5px; }
        .notify-desc { font-size: 13px; opacity: 0.8; margin-bottom: 15px; }
        
        .client-form input {
            width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; 
            border-radius: 8px; font-size: 14px; text-align: left; text-transform: none; font-weight: normal; box-sizing: border-box;
        }
        .whatsapp-btn {
            background: #25D366; color: white; border: none; width: 100%; padding: 15px; 
            border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .whatsapp-btn:hover { background: #128c7e; }

        .footer { margin-top: auto; text-align: center; font-size: 11px; opacity: 0.4; padding-top: 40px; }
        .loader { display: none; color: var(--vw-blue); margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <div class="portal-title">Volkswagen Madrid</div>
            <div class="portal-subtitle">Partner Portal</div>
        </div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Volkswagen_logo_2019.svg" class="logo">
    </div>

    <div class="search-box">
        <h1 style="margin:0;">Estado de Vehículos</h1>
        <p style="margin-top:5px;">Introduce Matrícula o Bastidor</p>
        <input type="text" id="searchInput" placeholder="Ej: 1234BBB" onkeyup="handleEnter(event)">
        <button onclick="searchCar()">Consultar Tracking</button>
        <div id="loader" class="loader"><i class="fas fa-spinner fa-spin"></i> Conectando...</div>
    </div>

    <div id="result-area"></div>

    <div class="footer">Dpto. Entregas - VW Madrid</div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQwgyl0JLibHf3M9H4uU8RP8GRIzgwqlLiExfvgOOzDgKEwl0Ikgg4qEfnlF2FAJ8lIzhgDd8VjiNnz/pub?output=csv'; 
    
    // ENLACE A LA APP DE CLIENTES (Corregido a netlify.app)
    const LINK_APP_CLIENTES = 'https://entregasvwmadrid.netlify.app'; 

    let currentCar = null; // Guardamos el coche actual

    function handleEnter(e) { if(e.key === 'Enter') searchCar(); }

    async function searchCar() {
        const queryRaw = document.getElementById('searchInput').value;
        const query = queryRaw.toUpperCase().trim().replace(/\s/g, '');
        const resultArea = document.getElementById('result-area');
        const loader = document.getElementById('loader');

        if(query.length < 4) { alert("Mínimo 4 caracteres."); return; }

        resultArea.style.display = 'none';
        loader.style.display = 'block';

        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split(/\r?\n/).map(row => row.split(','));

            currentCar = null;
            
            for (let i = 1; i < rows.length; i++) {
                if (rows[i].length < 3) continue;
                
                const bastidor = rows[i][0].replace(/['"]+/g, '').toUpperCase().trim();
                const matricula = rows[i][1].replace(/['"]+/g, '').toUpperCase().replace(/\s/g, '');
                
                if (bastidor.includes(query) || matricula.includes(query)) {
                    currentCar = {
                        bastidor: bastidor,
                        matricula: rows[i][1].replace(/['"]+/g, ''),
                        modelo: rows[i][2].replace(/['"]+/g, ''),
                        fechas: [
                            rows[i][3] ? rows[i][3].replace(/['"]+/g, '').trim() : "",
                            rows[i][4] ? rows[i][4].replace(/['"]+/g, '').trim() : "",
                            rows[i][5] ? rows[i][5].replace(/['"]+/g, '').trim() : "",
                            rows[i][6] ? rows[i][6].replace(/['"]+/g, '').trim() : ""
                        ]
                    };
                    break;
                }
            }

            loader.style.display = 'none';
            if (currentCar) showResult(currentCar);
            else {
                resultArea.innerHTML = `<div style="text-align:center; padding:20px; opacity:0.6;">No encontrado. Revisa los datos.</div>`;
                resultArea.style.display = 'block';
            }

        } catch (error) {
            console.error(error);
            loader.style.display = 'none';
            alert("Error de conexión.");
        }
    }

    function showResult(car) {
        const resultArea = document.getElementById('result-area');
        const steps = ["Documentación", "En Transporte", "En Preparación", "Listo para Entrega"];
        const icons = ["fa-file-contract", "fa-truck", "fa-tools", "fa-key"];
        
        let timelineHTML = '';
        let currentStatus = "Desconocido";
        let colorStatus = "#001E50";
        let isReady = false; // Bandera para saber si está listo

        for (let i = 0; i < 4; i++) {
            const date = car.fechas[i];
            const isCompleted = date !== "";
            const isCurrent = isCompleted && (i === 3 || car.fechas[i+1] === "");
            
            let classList = "timeline-item";
            if(isCompleted) classList += " completed";
            if(isCurrent) {
                classList += " current";
                currentStatus = steps[i];
                if(i === 3) {
                    colorStatus = "#2e7d32";
                    isReady = true; // El coche está en el paso 4
                } else if(i === 0) colorStatus = "#c62828";
                else colorStatus = "#001E50";
            }

            timelineHTML += `
                <div class="${classList}">
                    <div class="dot"><i class="fas ${icons[i]}"></i></div>
                    <div class="content">
                        <div class="step-title">${steps[i]}</div>
                        <div class="step-date">${date || "Pendiente"}</div>
                    </div>
                </div>
            `;
        }

        if (currentStatus === "Desconocido" && car.fechas[0] === "") currentStatus = "Sin Iniciar";

        // HTML base de la tarjeta
        let cardHTML = `
            <div class="card">
                <div class="card-header">
                    <div class="model-name">${car.modelo}</div>
                    <div class="plate">${car.matricula || '---'}</div>
                </div>
                <div class="current-status-banner" style="background:${colorStatus}">
                    ESTADO: <strong>${currentStatus.toUpperCase()}</strong>
                </div>
                <div class="tracking-container">
                    ${timelineHTML}
                </div>
        `;

        // SI EL COCHE ESTÁ LISTO (PASO 4), AÑADIMOS LA CAJA DE WHATSAPP CON TU LINK
        if (isReady) {
            cardHTML += `
                <div class="notify-section">
                    <div class="notify-title">🎉 ¡Enhorabuena! Vehículo Listo</div>
                    <div class="notify-desc">Avisa al cliente para que agende su entrega.</div>
                    <div class="client-form">
                        <input type="text" id="clientName" placeholder="Nombre del Cliente">
                        <input type="tel" id="clientPhone" placeholder="Teléfono Móvil (ej: 600123456)">
                        <button class="whatsapp-btn" onclick="notifyClient()">
                            <i class="fab fa-whatsapp"></i> Avisar al Cliente
                        </button>
                    </div>
                </div>
            `;
        } else {
            // Si no está listo, mensaje de espera
            cardHTML += `
                <div style="padding:15px; text-align:center; border-top:1px solid #eee; font-size:12px; color:#666;">
                    Por favor, esperad a que el estado sea "Listo para Entrega" para avisar al cliente.
                </div>
            `;
        }

        cardHTML += `</div>`; // Cierre de card
        resultArea.innerHTML = cardHTML;
        resultArea.style.display = 'block';
    }

    function notifyClient() {
        const name = document.getElementById('clientName').value;
        const phone = document.getElementById('clientPhone').value;

        if(!name || !phone) {
            alert("Por favor, rellena nombre y teléfono.");
            return;
        }

        // MENSAJE WHATSAPP
        const msg = `Estimado ${name}, le informamos que su coche ${currentCar.modelo} con matrícula ${currentCar.matricula} ya está listo para su entrega. 
        
A continuación le dejamos la web donde podrá agendar la entrega de su vehículo: 
👉 ${LINK_APP_CLIENTES}`;

        // Abrir WhatsApp Web/App
        window.open(`https://wa.me/34${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
</html>
