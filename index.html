<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="author" content="Manuel Arjona Carrera & Miriam Olmo Fernández">
  <meta name="copyright" content="© 2026 Manuel Arjona Carrera & Miriam Olmo Fernández. Todos los derechos reservados.">
  <meta name="application-name" content="GesCar OS / B2B">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GesCar B2B | Castellana Wagen M-40</title>
  
  <!-- Importación de librerías CSS y JS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Reglas CSS personalizadas para animaciones y fuentes -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; } /* Fondo gris muy claro casi blanco */
    
    /* Animación de entrada fluida */
    .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* Barra de desplazamiento limpia */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    /* Estilos para los campos de entrada de texto */
    .input-clean {
        background: #ffffff;
        border: 2px solid #e2e8f0;
        color: #0f172a;
        transition: all 0.3s ease;
    }
    .input-clean:focus {
        border-color: #00B0F0;
        box-shadow: 0 0 0 4px rgba(0, 176, 240, 0.1);
        outline: none;
    }
  </style>

  <script type="module">
    // Importación de módulos de Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
    
    // Configuración de la base de datos
    const firebaseConfig = {
      apiKey: "AIzaSyCRfERugbIVfAXtKa7mGdLLTm6xwxb5wlE",
      authDomain: "gestion-flotas-vw.firebaseapp.com",
      projectId: "gestion-flotas-vw",
      storageBucket: "gestion-flotas-vw.firebasestorage.app",
      messagingSenderId: "1070891769268",
      appId: "1:1070891769268:web:47b04e6d62e576038966e1"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Variables de estado
    let cocheActual = null;
    window.nombreAgenciaGlobal = ""; 

    // 1. OBJETO DE CREDENCIALES
    const credencialesRenting = {
        "ARVAL": "Arval2026", "VW RENTING": "Vw2026", "ATHLON": "Athlon2026", 
        "ALPHABET": "Alphabet2026", "AYVENS": "Ayvens2026", "SANTANDER RENTING": "Santander2026", 
        "SABADELL": "Sabadell2026", "CAIXA": "Caixa2026"
    };

    // 2. OBJETO DE LOGOS (Apuntando a tu repositorio en GitHub)
    const logosRenting = {
        "ARVAL": "https://raw.githubusercontent.com/vwmadrid/Renting/main/images/arval.png",
        "VW RENTING": "https://raw.githubusercontent.com/vwmadrid/Renting/main/images/vwrenting.png",
        "ATHLON": "https://raw.githubusercontent.com/vwmadrid/Renting/main/images/athlon.png",
        "ALPHABET": "https://raw.githubusercontent.com/vwmadrid/Renting/main/images/alphabet.png",
        "AYVENS": "https://raw.githubusercontent.com/vwmadrid/Renting/main/images/ayvens.png",
        "SANTANDER RENTING": "https://raw.githubusercontent.com/vwmadrid/Renting/main/images/santander.png",
        "SABADELL": "https://raw.githubusercontent.com/vwmadrid/Renting/main/images/sabadell.png",
        "CAIXA": "https://raw.githubusercontent.com/vwmadrid/Renting/main/images/caixa.png"
    };

    // 3. LÓGICA DE LOGIN
    window.verificarAcceso = function() {
        const usuarioInput = document.getElementById('inputUsuario').value.trim().toUpperCase();
        const passInput = document.getElementById('inputPassword').value.trim();

        if (!usuarioInput || !passInput) {
            return Swal.fire({ icon: 'warning', title: 'Datos incompletos', text: 'Complete sus credenciales.', confirmButtonColor: '#001e50' });
        }

        const btn = document.getElementById('btnLogin');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Autenticando...';

        setTimeout(() => {
            if (credencialesRenting[usuarioInput] && credencialesRenting[usuarioInput] === passInput) {
               // Dentro de verificarAcceso, cuando el login es correcto:
window.nombreAgenciaGlobal = usuarioInput;

// Guardar sesión permanentemente (recordar usuario y pass)
localStorage.setItem('gescar_session', JSON.stringify({
    usuario: usuarioInput,
    pass: passInput
}));

// ... resto del código que ya tienes para cambiar de pantalla
                
                // Muestra el nombre en el subtítulo del Dashboard
                document.getElementById('hero-nombre-agencia').innerText = "Portal " + window.nombreAgenciaGlobal;
                
                // Inyecta la URL de la imagen en la etiqueta <img>
                const imgElement = document.getElementById('dashboard-logo-img');
                const txtElement = document.getElementById('dashboard-logo-txt');
                
                if (logosRenting[usuarioInput]) {
                    imgElement.src = logosRenting[usuarioInput];
                    imgElement.classList.remove('hidden');
                    txtElement.classList.add('hidden');
                } else {
                    imgElement.classList.add('hidden');
                    txtElement.innerText = window.nombreAgenciaGlobal;
                    txtElement.classList.remove('hidden');
                }

                document.getElementById('nav-agency-name').innerText = window.nombreAgenciaGlobal;

                // Cambio de pantalla alterando las clases CSS
                document.getElementById('pantalla-login').classList.add('hidden');
                document.getElementById('pantalla-tracker').classList.remove('hidden');
                document.getElementById('pantalla-tracker').classList.add('flex', 'animate-fade-in');

                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Conexión Establecida', showConfirmButton: false, timer: 2000 });
            } else {
                Swal.fire({ icon: 'error', title: 'Acceso Denegado', text: 'Credenciales incorrectas.', confirmButtonColor: '#ef4444' });
                document.getElementById('inputPassword').value = '';
                btn.innerHTML = 'ACCEDER AL SISTEMA <i class="ph-bold ph-arrow-right"></i>';
            }
        }, 500); 
    };

    // Fallback de código por si la imagen de GitHub no carga
    window.logoError = function() {
        document.getElementById('dashboard-logo-img').classList.add('hidden');
        const txtElement = document.getElementById('dashboard-logo-txt');
        txtElement.innerText = window.nombreAgenciaGlobal;
        txtElement.classList.remove('hidden');
    };

    // Evento para iniciar sesión presionando la tecla Enter
    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('inputPassword').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') window.verificarAcceso();
        });
    });

    // 4. LÓGICA DE BÚSQUEDA DE VEHÍCULO
    window.buscarCoche = async function() {
      const input = document.getElementById('inputMatricula');
      const mat = input.value.replace(/\s/g, '').toUpperCase();
      if (!mat) return Swal.fire({ icon: 'warning', title: 'Requerido', text: 'Introduce matrícula o bastidor', confirmButtonColor: '#001e50' });

      const btn = document.getElementById('btnBuscar');
      btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl text-white"></i>';
      
      try {
        const q = query(collection(db, "vehiculos"), where("matricula", "==", mat));
        const querySnapshot = await getDocs(q);
        if (querySnapshot.empty) {
          btn.innerHTML = '<i class="ph-bold ph-magnifying-glass text-xl text-white"></i>';
          document.getElementById('resultado').style.display = 'none'; 
          return Swal.fire({ icon: 'info', title: 'No localizado', text: 'Vehículo no encontrado.', confirmButtonColor: '#001e50' });
        }
        cocheActual = querySnapshot.docs[0].data();
        window.mostrarTracker(cocheActual);
        btn.innerHTML = '<i class="ph-bold ph-magnifying-glass text-xl text-white"></i>';
      } catch (error) { 
        btn.innerHTML = '<i class="ph-bold ph-magnifying-glass text-xl text-white"></i>';
        Swal.fire({ icon: 'error', title: 'Error de red', confirmButtonColor: '#ef4444' }); 
      }
    };

    // 5. CONSTRUCCIÓN HTML DEL TIMELINE
    window.mostrarTracker = function(c) {
       const resDiv = document.getElementById('resultado');
       resDiv.style.display = 'block';
       resDiv.classList.add('animate-fade-in');
       
       document.getElementById('resModelo').innerText = c.modelo;
       document.getElementById('resMatricula').innerText = c.matricula;

       let html = '<div class="relative border-l-2 border-slate-200 ml-5 space-y-8 mt-10 mb-10">';
       const pasos = [
         { ok: !!c.fechaDoc, t: 'Documentación', desc: c.fechaDoc ? `Validada el ${c.fechaDoc}` : 'Pendiente', icon: 'ph-file-text', colorText: 'text-[#001e50]', colorBg: 'bg-blue-100', border: 'border-[#001e50]' },
         { ok: !!c.fechaTransporte, t: 'En Tránsito', desc: c.fechaTransporte ? `Recepción: ${c.fechaTransporte}` : 'Pendiente', icon: 'ph-truck', colorText: 'text-[#001e50]', colorBg: 'bg-indigo-100', border: 'border-[#001e50]' },
         { ok: !!c.fechaPreparacion, t: 'Preparación', desc: c.fechaPreparacion ? `Taller: ${c.fechaPreparacion}` : 'Pendiente', icon: 'ph-wrench', colorText: 'text-[#001e50]', colorBg: 'bg-amber-100', border: 'border-[#001e50]' },
         { ok: c.pasoAInventario === true, t: 'Listo para Entrega', desc: c.pasoAInventario ? 'Vehículo finalizado' : 'En proceso', icon: 'ph-check-circle', colorText: 'text-[#25D366]', colorBg: 'bg-green-100', border: 'border-[#25D366]' }
       ];

       pasos.forEach((p, index) => {
         let isCompleted = p.ok;
         let isActive = p.ok && (!pasos[index + 1] || !pasos[index + 1].ok) && index !== 3;
         
         let iconClass = isCompleted ? p.colorText : 'text-slate-400';
         let dotBg = isCompleted ? 'bg-white' : 'bg-slate-50';
         let dotBorder = isCompleted ? p.border : 'border-slate-300';
         let textTitle = isCompleted ? 'text-[#001e50]' : 'text-slate-400';
         let textDesc = isCompleted ? 'text-slate-500' : 'text-slate-400';
         
         let pulse = isActive ? `<span class="absolute inset-0 rounded-full ${p.colorBg} animate-ping"></span>` : "";

         html += `
         <div class="relative flex items-start gap-6 group">
            <div class="absolute -left-[21px] w-10 h-10 rounded-full flex items-center justify-center border-2 ${dotBorder} ${dotBg} z-10 transition-all duration-500 shadow-sm">
                ${pulse}
                <i class="ph-fill ${p.icon} text-lg ${iconClass} relative z-20"></i>
            </div>
            <div class="pl-8 pt-1 transition-transform duration-300 group-hover:translate-x-1">
                <h3 class="font-bold text-[15px] uppercase tracking-wider ${textTitle}">${p.t}</h3>
                <p class="text-sm font-medium ${textDesc} mt-1">${p.desc}</p>
            </div>
         </div>`;
       });

       html += '</div>';
       document.getElementById('timelineRenting').innerHTML = html;

       document.getElementById('btnNotificar').style.display = (c.pasoAInventario === true) ? 'flex' : 'none';
    };

    // 6. FUNCIONES DE PORTAPAPELES Y WHATSAPP
    window.copiarAlPortapapeles = function(textoCodificado) {
      navigator.clipboard.writeText(decodeURIComponent(textoCodificado)).then(() => {
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copiado al portapapeles', showConfirmButton: false, timer: 2000 });
      });
    };

    window.notificarCliente = function() {
      if (!cocheActual) return;
      const LINK_APP_CLIENTES = "https://vwmadrid.github.io/Entregas/"; 
      
      const whatsappText = `🚙 *Entrega de su nuevo vehículo*\n\nEstimado/a cliente,\n\nNos complace informarle desde *${window.nombreAgenciaGlobal}* que su nuevo *Volkswagen ${cocheActual.modelo}* (Matrícula: ${cocheActual.matricula}) ya se encuentra matriculado y preparado para su entrega.\n\nPara garantizar una experiencia premium, la recogida se realizará en el concesionario oficial *Castellana Wagen M-40*.\n\nHemos habilitado un *Portal Privado de Cliente* para usted. Desde allí podrá:\n📅 Seleccionar el día y hora exactos de su recogida.\n📱 Consultar las guías interactivas de su coche.\n📍 Ver la ubicación de las instalaciones.\n\nPor favor, acceda a su portal oficial para agendar su cita en el siguiente enlace seguro:\n👉 ${LINK_APP_CLIENTES}\n\nUn cordial saludo,\n*El equipo de ${window.nombreAgenciaGlobal}*`;
      const emailSubject = `Su nuevo Volkswagen ${cocheActual.modelo} está listo para entrega`;
      const emailBody = whatsappText.replace(/\*/g, '').replace(/\n/g, '%0D%0A');

      Swal.fire({
        title: 'ENVIAR INVITACIÓN',
        html: `
          <div style="text-align:left; font-size:14px; color:#64748b; margin-bottom:20px; line-height:1.5;">
            El cliente recibirá un enlace seguro para agendar la recogida en Castellana Wagen.
          </div>
          <div style="background:#f8fafc; border-left: 4px solid #00B0F0; padding:15px; border-radius:8px; text-align:left; font-size:12px; font-family:monospace; color:#475569; white-space: pre-wrap; margin-bottom: 25px; max-height: 150px; overflow-y: auto; border: 1px solid #e2e8f0;">🚙 *Entrega de su nuevo vehículo*

Estimado/a cliente,

Nos complace informarle desde *${window.nombreAgenciaGlobal}* que su nuevo *Volkswagen ${cocheActual.modelo}* (Matrícula: ${cocheActual.matricula}) ya se encuentra matriculado...</div>
          
          <div style="display:grid; grid-template-columns: 1fr; gap:12px;">
            <button onclick="window.open('https://wa.me/?text=${encodeURIComponent(whatsappText)}', '_blank')" class="w-full bg-[#25D366] text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-green-600 transition shadow-md">
              <i class="ph-fill ph-whatsapp-logo text-2xl"></i> Enviar WhatsApp
            </button>
            <button onclick="window.open('mailto:?subject=${encodeURIComponent(emailSubject)}&body=${emailBody}', '_blank')" class="w-full bg-[#001e50] text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-blue-900 transition shadow-md">
              <i class="ph-fill ph-envelope-simple text-2xl"></i> Enviar Email
            </button>
            <button onclick="window.copiarAlPortapapeles('${encodeURIComponent(whatsappText)}')" class="w-full bg-slate-200 text-slate-800 py-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-slate-300 transition">
              <i class="ph-bold ph-copy text-2xl"></i> Copiar Texto
            </button>
          </div>
        `,
        showConfirmButton: false, showCloseButton: true, width: '450px',
        customClass: { popup: 'rounded-3xl' }
      });
    };
  </script>
</head>

<body class="min-h-screen flex flex-col relative selection:bg-[#00B0F0] selection:text-white">
  
  <!-- CABECERA SUPERIOR (Se muestra tras el login) -->
  <header id="main-header" class="w-full border-b border-slate-200 bg-white hidden relative z-50 shadow-sm">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <img src="https://cdn.worldvectorlogo.com/logos/volkswagen-logo-2019.svg" class="h-8 w-auto">
            <div class="h-6 w-px bg-slate-200"></div>
            <span class="text-[#001e50] font-bold text-sm tracking-widest uppercase">Castellana Wagen</span>
        </div>
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-blue-50 border border-blue-100 flex items-center justify-center">
                <i class="ph-fill ph-user text-[#00B0F0]"></i>
            </div>
            <span id="nav-agency-name" class="text-xs font-bold text-slate-500 uppercase tracking-widest hidden sm:block">Agencia</span>
            <button onclick="window.cerrarSesion()" class="ml-4 text-slate-400 hover:text-red-500 transition">
                <i class="ph-bold ph-sign-out text-xl"></i>
            </button>
        </div>
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-blue-50 border border-blue-100 flex items-center justify-center">
                <i class="ph-fill ph-user text-[#00B0F0]"></i>
            </div>
            <span id="nav-agency-name" class="text-xs font-bold text-slate-500 uppercase tracking-widest hidden sm:block">Agencia</span>
        </div>
    </div>
  </header>

  <!-- ============================================== -->
  <!-- PANTALLA 1: FORMULARIO DE LOGIN -->
  <!-- ============================================== -->
  <main id="pantalla-login" class="flex-1 flex items-center justify-center p-4 relative z-10">
    <div class="bg-white p-10 sm:p-12 rounded-[2rem] w-full max-w-md shadow-2xl shadow-slate-200 border border-slate-100">
        
        <div class="flex flex-col items-center mb-10">
            <img src="https://cdn.worldvectorlogo.com/logos/volkswagen-logo-2019.svg" class="h-16 w-auto mb-6">
            <h2 class="text-3xl font-black text-[#001e50] tracking-tight">GesCar B2B</h2>
            <p class="text-sm font-bold text-[#00B0F0] uppercase tracking-[0.2em] mt-2">Delivery Network</p>
        </div>
        
        <div class="space-y-5 mb-8">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="ph-fill ph-buildings text-slate-400 text-lg"></i>
                </div>
                <input type="text" id="inputUsuario" placeholder="CÓDIGO DE AGENCIA" class="input-clean w-full pl-12 pr-4 py-4 rounded-xl text-sm font-bold uppercase tracking-widest placeholder:text-slate-400 placeholder:tracking-normal placeholder:font-medium">
            </div>
            
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="ph-fill ph-lock-key text-slate-400 text-lg"></i>
                </div>
                <input type="password" id="inputPassword" placeholder="CONTRASEÑA" class="input-clean w-full pl-12 pr-4 py-4 rounded-xl text-sm font-bold placeholder:text-slate-400 placeholder:font-medium">
            </div>
        </div>
        
        <button id="btnLogin" onclick="window.verificarAcceso()" class="w-full bg-[#001e50] text-white font-black py-4 rounded-xl text-sm uppercase tracking-widest transition-all hover:bg-[#00B0F0] shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2">
            ACCEDER AL SISTEMA <i class="ph-bold ph-arrow-right"></i>
        </button>
    </div>
  </main>

  <!-- ============================================== -->
  <!-- PANTALLA 2: DASHBOARD (DISEÑO LIMPIO) -->
  <!-- ============================================== -->
  <main id="pantalla-tracker" class="flex-1 hidden flex-col items-center p-4 sm:p-8 w-full max-w-5xl mx-auto relative z-10">
    
    <!-- CONTENEDOR DEL LOGO DE LA AGENCIA GIGANTE -->
    <!-- NOTA CÓDIGO: Las clases w-48 sm:w-72 md:w-96 y h-32 sm:h-48 aumentan radicalmente el tamaño -->
    <div class="w-full bg-white rounded-[2rem] p-8 sm:p-12 mb-8 shadow-xl shadow-slate-200/50 border border-slate-100 flex flex-col sm:flex-row items-center justify-between gap-8 text-center sm:text-left">
        
        <!-- LOGO RENTING AMPLIADO -->
        <div class="w-48 sm:w-72 md:w-96 h-32 sm:h-48 flex items-center justify-center shrink-0">
            <!-- La imagen ocupa el 100% del contenedor manteniendo su proporción -->
            <img id="dashboard-logo-img" src="" class="w-full h-full object-contain hidden" onerror="window.logoError()">
            <span id="dashboard-logo-txt" class="hidden text-[#001e50] font-black text-4xl sm:text-5xl tracking-widest uppercase px-2"></span>
        </div>
        
        <!-- TEXTO DEL BANNER -->
        <div>
            <div class="inline-flex items-center gap-2 bg-blue-50 border border-blue-100 px-3 py-1 rounded-full mb-4">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#00B0F0] opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-[#00B0F0]"></span></span>
                <span class="text-[10px] font-bold text-[#001e50] uppercase tracking-widest">Portal Conectado</span>
            </div>
            <h2 id="hero-nombre-agencia" class="text-3xl sm:text-4xl font-black text-[#001e50] tracking-tight mb-2">Portal Agencia</h2>
            <p class="text-sm font-medium text-slate-500">Localizador en tiempo real de Castellana Wagen.</p>
        </div>
    </div>

    <!-- REJILLA DE BÚSQUEDA Y RESULTADOS -->
    <div class="w-full grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- CAJA DE BÚSQUEDA -->
        <div class="lg:col-span-5 flex flex-col gap-6">
            <div class="bg-white p-8 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100">
                <h3 class="text-sm font-bold text-[#001e50] uppercase tracking-widest mb-6 flex items-center gap-2">
                    <i class="ph-bold ph-magnifying-glass text-[#00B0F0]"></i> Buscar Vehículo
                </h3>
                <div class="relative mb-4">
                    <input type="text" id="inputMatricula" placeholder="MATRÍCULA / BASTIDOR" class="input-clean w-full px-5 py-5 rounded-xl text-xl font-black text-center uppercase tracking-[0.2em] placeholder:text-slate-400 placeholder:text-sm placeholder:tracking-normal placeholder:font-medium">
                </div>
                <button id="btnBuscar" onclick="window.buscarCoche()" class="w-full bg-[#001e50] text-white font-black py-4 rounded-xl text-lg transition hover:bg-[#00B0F0] shadow-lg shadow-blue-900/20 flex items-center justify-center">
                    <i class="ph-bold ph-magnifying-glass text-xl"></i>
                </button>
            </div>
        </div>
        
        <!-- TIMELINE DE RESULTADOS -->
        <div class="lg:col-span-7">
            <div id="resultado" style="display: none;" class="bg-white p-8 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 h-full">
                
                <div class="flex flex-col sm:flex-row items-center sm:items-start justify-between gap-6 mb-10 pb-8 border-b border-slate-100">
                    <div>
                        <p class="text-[10px] font-bold text-[#00B0F0] uppercase tracking-widest mb-1">Unidad Identificada</p>
                        <h2 id="resModelo" class="text-3xl font-black text-[#001e50] uppercase tracking-tight">Modelo</h2>
                    </div>
                    <div class="bg-slate-50 border border-slate-200 px-4 py-2 rounded-lg">
                        <span id="resMatricula" class="font-black text-xl tracking-[0.15em] text-[#001e50]"></span>
                    </div>
                </div>

                <!-- Contenedor del cronograma que se genera con JS -->
                <div id="timelineRenting" class="mb-10"></div>
                
                <button id="btnNotificar" onclick="window.notificarCliente()" style="display: none;" class="w-full bg-[#001e50] text-white font-black py-5 rounded-xl flex items-center justify-center gap-3 hover:bg-[#00B0F0] transition shadow-lg shadow-blue-900/20 text-sm uppercase tracking-widest">
                    GENERAR INVITACIÓN VIP <i class="ph-bold ph-arrow-right"></i>

    </div>
  </main>

  <script>
    // Lógica adicional para mostrar el encabezado solo después de iniciar sesión
    const observer = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        if (mutation.target.classList.contains('hidden')) {
          document.getElementById('main-header').classList.remove('hidden');
        }
      });
    });
    observer.observe(document.getElementById('pantalla-login'), { attributes: true, attributeFilter: ['class'] });
    // Autologin al cargar la página
    window.onload = function() {
        const sesionGuardada = localStorage.getItem('gescar_session');
        if (sesionGuardada) {
            const { usuario, pass } = JSON.parse(sesionGuardada);
            document.getElementById('inputUsuario').value = usuario;
            document.getElementById('inputPassword').value = pass;
            window.verificarAcceso(); // Ejecuta el login automáticamente
        }
    };

    // Función de cierre de sesión
    window.cerrarSesion = function() {
        localStorage.removeItem('gescar_session');
        location.reload(); // Recarga la página volviendo al login
    };
  </script>
</body>
</html>
